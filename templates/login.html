
<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Вход</title>
<style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:linear-gradient(135deg,#f8f3ea,#eee3d2);color:#211b15}.card{width:min(420px,92vw);background:rgba(255,255,255,.85);border:1px solid rgba(80,60,35,.14);border-radius:28px;padding:28px;box-shadow:0 24px 70px rgba(67,49,28,.14)}.brand{color:#b48a3c;font-weight:700;margin-bottom:20px}h1{margin:0 0 10px;font-size:34px}p{color:#7f7467}input{width:100%;padding:14px;border:1px solid rgba(80,60,35,.14);border-radius:14px;margin:8px 0;box-sizing:border-box}button{width:100%;padding:14px;border:0;border-radius:14px;background:linear-gradient(135deg,#b48a3c,#d8bb7a);color:white;font-weight:700;margin-top:10px}.flash{background:#fff7df;border:1px solid #ead8a9;padding:10px;border-radius:12px;margin-bottom:12px}</style></head>
<body><form class="card" method="post"><div class="brand">SJ · SELEZNEV Local Share 2.0</div><h1>Вход</h1><p>Локальная система обмена файлами.</p>{% with messages=get_flashed_messages() %}{% if messages %}{% for msg in messages %}<div class="flash">{{msg}}</div>{% endfor %}{% endif %}{% endwith %}<input name="username" placeholder="Логин" value="admin"><input name="password" type="password" placeholder="Пароль"><button>Войти</button></form></body></html>
