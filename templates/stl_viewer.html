
<!doctype html><html><head><meta charset="utf-8"><title>3D STL</title><style>body{margin:0;background:#111;color:white;font-family:Arial}.top{position:fixed;top:12px;left:12px;right:12px;z-index:2;display:flex;justify-content:space-between}a{background:#b48a3c;color:white;border-radius:12px;padding:10px 14px;text-decoration:none}#info{background:rgba(0,0,0,.45);padding:10px 14px;border-radius:12px}</style></head><body><div class="top"><a href="/?room={{room}}">← Назад</a><div id="info">{{filename}}</div></div><script type="module">import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';import{STLLoader}from'https://unpkg.com/three@0.160.0/examples/jsm/loaders/STLLoader.js';import{OrbitControls}from'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';const scene=new THREE.Scene();scene.background=new THREE.Color(0x111111);const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,10000);camera.position.set(0,-80,45);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);document.body.appendChild(renderer.domElement);const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2.2));const light=new THREE.DirectionalLight(0xffffff,2.6);light.position.set(50,-70,100);scene.add(light);const mat=new THREE.MeshStandardMaterial({color:0xd9a441,metalness:1,roughness:.22});new STLLoader().load('/view/{{room}}/{{filename}}',g=>{g.computeVertexNormals();const mesh=new THREE.Mesh(g,mat);g.center();const box=new THREE.Box3().setFromObject(mesh);const size=new THREE.Vector3();box.getSize(size);mesh.scale.multiplyScalar(45/Math.max(size.x,size.y,size.z));scene.add(mesh)});function anim(){requestAnimationFrame(anim);controls.update();renderer.render(scene,camera)}anim();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
