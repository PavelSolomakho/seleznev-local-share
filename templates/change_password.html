
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Смена пароля · SELEZNEV Local Share</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,sans-serif;background:#f8f3ea;margin:0;color:#211b15}
    .card{width:min(440px,92vw);margin:50px auto;background:white;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    a{color:#b48a3c;text-decoration:none}
    input{width:100%;padding:13px;border:1px solid #e4d8c8;border-radius:12px;margin:8px 0;box-sizing:border-box}
    button{width:100%;padding:13px;border:0;border-radius:12px;background:#b48a3c;color:white;font-weight:700}
    .flash{background:#fff7df;border:1px solid #ead8a9;padding:10px;border-radius:12px;margin-bottom:12px}
  </style>
</head>
<body>
  <form class="card" method="post">
    <a href="/">← Назад</a>
    <h1>Смена пароля</h1>

    {% with messages=get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
      {% endif %}
    {% endwith %}

    <input type="password" name="old_password" placeholder="Старый пароль">
    <input type="password" name="new_password" placeholder="Новый пароль">
    <button>Сменить пароль</button>
  </form>
</body>
</html>
