<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>История</title><style>body{font-family:Arial;background:#f8f3ea}.wrap{max-width:1000px;margin:30px auto;background:white;border-radius:22px;padding:22px}td,th{padding:10px;border-bottom:1px solid #eee;text-align:left}table{width:100%;border-collapse:collapse}a{color:#b48a3c}</style></head><body><div class="wrap"><a href="/">← Назад</a><h1>История</h1><table><tr><th>Время</th><th>Пользователь</th><th>Действие</th><th>Комната</th><th>Файл</th></tr>{% for h in history %}<tr><td>{{h.time}}</td><td>{{h.user}}</td><td>{{h.action}}</td><td>{{h.room}}</td><td>{{h.filename}}</td></tr>{% endfor %}</table></div></body></html>
